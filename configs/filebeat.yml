# =========================
# Filebeat Configuration
# SOC Lab - Snort IDS + ELK
# =========================

filebeat.inputs:

- type: log
  enabled: true
  paths:
    - /var/log/snort/snort.alert.fast
    - /var/log/snort/snort.alert

# =========================
# Output to Elasticsearch
# =========================
output.elasticsearch:
  hosts: ["http://YOUR_ELASTIC_IP:9200"]
  username: "elastic"
  password: "YOUR_PASSWORD_HERE"

# =========================
# Performance tuning
# =========================
preset: balanced

filebeat.config.modules:
  enabled: false

logging.level: info
